version: '3.9'

# Development override — mounts source, enables hot-reload
services:
  mongo:
    image: mongo:6.0
    container_name: chatapp-mongo-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db
    networks:
      - chatapp-net-dev

  redis:
    image: redis:7-alpine
    container_name: chatapp-redis-dev
    ports:
      - "6379:6379"
    networks:
      - chatapp-net-dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatapp-backend-dev
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/chatapp_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret_do_not_use_in_prod
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongo
      - redis
    networks:
      - chatapp-net-dev

  frontend:
    image: node:18-alpine
    container_name: chatapp-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm start"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - chatapp-net-dev

volumes:
  mongo_data_dev:

networks:
  chatapp-net-dev:
    driver: bridge
